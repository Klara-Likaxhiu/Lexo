# Render Blueprint — optional; you can also configure these in the dashboard.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bookmindai
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_BASE_URL
        value: https://bookmindai-0a6u.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: BookMindAI <noreply@bookmind.ai>
      - key: OPENAI_API_KEY
        sync: false

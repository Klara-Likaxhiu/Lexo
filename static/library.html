<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Library - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/library.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js?v=cover-pipeline-v1" defer></script>
  <script src="js/book-card.js" defer></script>
  <script src="js/library-page.js" defer></script>
  <script src="js/import.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="library"></aside>

  <main class="dashboard library-bookshelf-page">

    <header class="library-header">
      <div>
        <h1>My Library</h1>
        <p class="page-subtitle">Your personal collection, beautifully organized.</p>
      </div>
      <button class="btn btn-primary" id="openImportBtn" type="button">+ Add Book</button>
    </header>

    <div id="bookshelfLoading" hidden></div>

    <section class="bookshelf-section">
      <h2>Currently Reading</h2>
      <div class="wooden-shelf" id="shelfReading" data-shelf="reading"></div>
    </section>

    <section class="bookshelf-section">
      <h2>Want to Read</h2>
      <div class="wooden-shelf" id="shelfWant" data-shelf="want"></div>
    </section>

    <section class="bookshelf-section">
      <h2>Finished</h2>
      <div class="wooden-shelf" id="shelfRead" data-shelf="read"></div>
    </section>

    <!-- Legacy hooks for JS -->
    <div class="visually-hidden" aria-hidden="true">
      <span id="readingTotal">0</span>
      <span id="wantTotal">0</span>
      <span id="readTotal">0</span>
      <span id="notInterestedTotal">0</span>
      <span id="shelfTitle"></span>
      <div id="libraryBooks"></div>
    </div>

    <div id="libraryToast" class="library-toast" hidden></div>
  </main>
</div>

<div id="importModal" class="import-overlay" hidden>
  <div class="import-modal card" role="dialog" aria-modal="true" aria-labelledby="importTitle">
    <div class="import-head">
      <div>
        <h2 id="importTitle">Add a Book</h2>
        <p class="import-subtitle">Import from a store, upload a file, or add it manually.</p>
      </div>
      <button class="import-close" id="closeImportBtn" type="button" aria-label="Close">&times;</button>
    </div>
    <div class="import-tabs">
      <button class="import-tab active" data-tab="search" type="button">Search</button>
      <button class="import-tab" data-tab="manual" type="button">Manual entry</button>
      <button class="import-tab" data-tab="upload" type="button">Upload file</button>
    </div>
    <div class="import-body">
      <div class="import-pane" data-pane="search">
        <div class="import-search-row">
          <input type="text" id="importSearchInput" placeholder="Search by title, author, or ISBN…" autocomplete="off">
          <button class="btn btn-primary" id="importSearchBtn" type="button">Search</button>
        </div>
        <div id="importSearchResults" class="import-results">
          <p class="import-hint">Search to find a book and its cover automatically.</p>
        </div>
      </div>
      <div class="import-pane" data-pane="manual" hidden>
        <div class="import-field">
          <label for="manualTitle">Title</label>
          <input type="text" id="manualTitle" placeholder="Book title" autocomplete="off">
        </div>
        <div class="import-field">
          <label for="manualAuthor">Author</label>
          <input type="text" id="manualAuthor" placeholder="Author name" autocomplete="off">
        </div>
        <div class="import-field">
          <label for="manualGenre">Genre</label>
          <input type="text" id="manualGenre" placeholder="e.g. Fantasy" autocomplete="off">
        </div>
      </div>
      <div class="import-pane" data-pane="upload" hidden>
        <label class="import-dropzone" for="importFileInput">
          <span class="import-dropzone-title">Choose a PDF or EPUB</span>
          <span class="import-hint" id="importFileName">No file selected</span>
          <input type="file" id="importFileInput" accept=".pdf,.epub,.txt,.md" hidden>
        </label>
        <div id="importUploadFields" hidden>
          <div class="import-field">
            <label for="uploadTitle">Title</label>
            <input type="text" id="uploadTitle" autocomplete="off">
          </div>
          <div class="import-field">
            <label for="uploadAuthor">Author</label>
            <input type="text" id="uploadAuthor" placeholder="Author name" autocomplete="off">
          </div>
        </div>
      </div>
    </div>
    <div class="import-footer">
      <div class="import-footer-fields">
        <div class="import-field">
          <label for="importShelf">Shelf</label>
          <select id="importShelf">
            <option value="want">Want to Read</option>
            <option value="reading">Currently Reading</option>
            <option value="read">Finished</option>
            <option value="not_interested">Not Interested</option>
          </select>
        </div>
        <div class="import-field">
          <label for="importSource">Reading source</label>
          <select id="importSource">
            <option value="">Not set</option>
            <option value="kindle">Kindle</option>
            <option value="apple_books">Apple Books</option>
            <option value="google_books">Google Books</option>
            <option value="physical">Physical book</option>
          </select>
        </div>
        <div class="import-field">
          <label for="importTotalPages">Total pages</label>
          <input type="number" id="importTotalPages" min="0" placeholder="Optional">
        </div>
      </div>
      <div class="import-footer-actions">
        <span id="importMessage" class="import-message"></span>
        <button class="btn btn-primary" id="importAddBtn" type="button">Add to My Library</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>

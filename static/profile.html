<!DOCTYPE html>
<html>
<head>
  <title>Profile - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <script src="js/auth.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="profile"></aside>

  <main class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1>My Profile</h1>
        <p class="profile-username-line">Signed in as <strong id="authUsername">—</strong></p>
      </div>
      <a href="settings.html" class="btn btn-secondary">Settings</a>
    </div>

    <section class="profile-grid">

      <div class="profile-card card">
        <div id="profileAvatar" class="profile-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:42px;height:42px;color:var(--primary)"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>

        <input type="file" id="profilePicInput" accept="image/*">

        <label>Nickname</label>
        <input type="text" id="nicknameInput" placeholder="Enter nickname">

        <label>About me</label>
        <textarea id="bioInput" placeholder="Write a short description about yourself..."></textarea>

        <button class="btn btn-primary" id="saveProfileBtn">Save Profile</button>
        <button class="btn btn-secondary" id="logoutProfileBtn" type="button">Log Out</button>
      </div>

      <div class="profile-card card">
        <h2>Reader DNA</h2>
        <p><strong>Type:</strong> <span id="readerType"></span></p>
        <p><strong>Level:</strong> <span id="readingLevel"></span></p>
        <p><strong>Genres:</strong> <span id="genres"></span></p>

        <hr>

        <h2>About</h2>
        <p id="displayBio">No description yet.</p>
      </div>

    </section>
  </main>

</div>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    if (window.BookMindAuth?.whenReady) {
      await BookMindAuth.whenReady();
    }

    const authUser = await BookMindAPI.getMe({ redirect: true });
    const usernameEl = document.getElementById("authUsername");
    if (usernameEl && authUser) {
      usernameEl.textContent = authUser.username;
    }

    const profile = JSON.parse(localStorage.getItem("readerProfile"));
    const savedUserProfile = JSON.parse(localStorage.getItem("bookmind_user_profile")) || {};

    const avatar = document.getElementById("profileAvatar");
    const nicknameInput = document.getElementById("nicknameInput");
    const bioInput = document.getElementById("bioInput");
    const displayBio = document.getElementById("displayBio");

    nicknameInput.value = savedUserProfile.nickname || (authUser && authUser.username) || "";
    bioInput.value = savedUserProfile.bio || "";
    displayBio.textContent = savedUserProfile.bio || "No description yet.";

    if (savedUserProfile.profilePic) {
      avatar.innerHTML = `<img src="${savedUserProfile.profilePic}" alt="Profile picture">`;
    }

    if (profile) {
      document.getElementById("readerType").textContent = profile.reader_type || "Not available";
      document.getElementById("readingLevel").textContent = profile.confirmed_reading_level || "Not available";
      document.getElementById("genres").textContent = (profile.favorite_genres || []).join(", ");
    }

    document.getElementById("profilePicInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        avatar.innerHTML = `<img src="${event.target.result}" alt="Profile picture">`;
        savedUserProfile.profilePic = event.target.result;
        localStorage.setItem("bookmind_user_profile", JSON.stringify(savedUserProfile));
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("saveProfileBtn").addEventListener("click", function () {
      const updatedProfile = {
        nickname: nicknameInput.value,
        bio: bioInput.value,
        profilePic: savedUserProfile.profilePic || null
      };

      localStorage.setItem("bookmind_user_profile", JSON.stringify(updatedProfile));

      displayBio.textContent = bioInput.value || "No description yet.";
      alert("Profile saved!");
    });

    document.getElementById("logoutProfileBtn").addEventListener("click", function () {
      if (window.BookMindAuth) BookMindAuth.logout();
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Profile - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/reading-path-passport.js" defer></script>
  <script src="js/reading-path-completion.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="profile"></aside>

  <main class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1>My Profile</h1>
        <p class="profile-username-line">Signed in as <strong id="authUsername">—</strong></p>
      </div>
      <a href="settings.html" class="btn btn-secondary">Settings</a>
    </div>

    <section class="profile-grid">

      <div class="profile-card card">
        <div id="profileAvatar" class="profile-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:42px;height:42px;color:var(--primary)"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>

        <input type="file" id="profilePicInput" accept="image/*">

        <label>Nickname</label>
        <input type="text" id="nicknameInput" placeholder="Enter nickname">

        <label>About me</label>
        <textarea id="bioInput" placeholder="Write a short description about yourself..."></textarea>

        <button class="btn btn-primary" id="saveProfileBtn">Save Profile</button>
        <button class="btn btn-secondary" id="logoutProfileBtn" type="button">Log Out</button>
      </div>

      <div class="profile-card card">
        <h2>Reader DNA</h2>
        <p><strong>Type:</strong> <span id="readerType"></span></p>
        <p><strong>Level:</strong> <span id="readingLevel"></span></p>
        <p><strong>Genres:</strong> <span id="genres"></span></p>

        <hr>

        <h2>About</h2>
        <p id="displayBio">No description yet.</p>
      </div>

    </section>

    <section id="journeyCollection" class="journey-collection card" hidden>
      <h2>Journey Collection</h2>
      <p class="journey-collection-sub">Meaningful reading journeys you've completed — not just books on a shelf.</p>
      <div class="journey-collection-stats" id="journeyCollectionStats"></div>
      <div class="journey-collection-highlight" id="journeyCollectionHighlight"></div>
      <a href="reading-paths.html" class="btn btn-secondary">View Reading Passport →</a>
    </section>

  </main>

</div>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    if (window.LexoAuth?.whenReady) await window.LexoAuth.whenReady();

    const authUser = await LexoAPI.getMe({ redirect: true });
    const usernameEl = document.getElementById("authUsername");
    if (usernameEl && authUser) usernameEl.textContent = authUser.username;

    const profile = JSON.parse(localStorage.getItem("readerProfile") || "null") || {};
    const savedUserProfile = JSON.parse(localStorage.getItem("lexo_user_profile") || "null") || {};
    const pathStats = window.LexoPathCompletion?.readStats?.() || { pathsCompleted: 0, completions: [] };
    const rawPaths = JSON.parse(localStorage.getItem("lexo_reading_paths") || "null");
    const paths = rawPaths?.paths || [];

    const avatar = document.getElementById("profileAvatar");
    const nicknameInput = document.getElementById("nicknameInput");
    const bioInput = document.getElementById("bioInput");
    const displayBio = document.getElementById("displayBio");

    nicknameInput.value = savedUserProfile.nickname || authUser?.username || "";
    bioInput.value = savedUserProfile.bio || "";
    displayBio.textContent = savedUserProfile.bio || "No description yet.";

    if (savedUserProfile.profilePic) {
      avatar.innerHTML = `<img src="${savedUserProfile.profilePic}" alt="Profile picture">`;
    }

    document.getElementById("readerType").textContent = profile.reader_type || "Not available";
    document.getElementById("readingLevel").textContent = profile.confirmed_reading_level || "Not available";
    document.getElementById("genres").textContent = (profile.favorite_genres || []).join(", ") || "—";

    const journeySection = document.getElementById("journeyCollection");
    if (pathStats.pathsCompleted > 0 || paths.some(p => p.path_completed)) {
      journeySection.hidden = false;
      const P = window.LexoPathPassport;
      const ps = P?.passportStats(paths, pathStats) || {};
      const favorite = P?.favoriteCompletedPath(pathStats.completions);
      const latest = P?.latestStamp(pathStats.completions);

      document.getElementById("journeyCollectionStats").innerHTML = `
        <div class="journey-stat-pill"><strong>${ps.pathsCompleted || pathStats.pathsCompleted}</strong> paths completed</div>
        <div class="journey-stat-pill"><strong>${ps.totalXp || pathStats.totalXp || 0}</strong> path XP earned</div>
        <div class="journey-stat-pill"><strong>${profile.journey_milestone || "Pathfinder"}</strong> milestone</div>
      `;

      document.getElementById("journeyCollectionHighlight").innerHTML = `
        <div class="journey-highlight-card">
          <p class="eyebrow">Favorite journey</p>
          <h3>${favorite?.pathName || profile.favorite_completed_path || "—"}</h3>
        </div>
        <div class="journey-highlight-card journey-stamp-preview">
          <p class="eyebrow">Latest passport stamp</p>
          <h3>${latest?.pathIcon || "📖"} ${latest?.pathName || profile.latest_passport_stamp || "—"}</h3>
          <p>${latest?.completedAt ? new Date(latest.completedAt).toLocaleDateString(undefined, { month: "long", year: "numeric" }) : ""}</p>
        </div>
      `;
    }

    document.getElementById("profilePicInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (event) {
        avatar.innerHTML = `<img src="${event.target.result}" alt="Profile picture">`;
        savedUserProfile.profilePic = event.target.result;
        localStorage.setItem("lexo_user_profile", JSON.stringify(savedUserProfile));
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("saveProfileBtn").addEventListener("click", function () {
      localStorage.setItem("lexo_user_profile", JSON.stringify({
        nickname: nicknameInput.value,
        bio: bioInput.value,
        profilePic: savedUserProfile.profilePic || null,
      }));
      displayBio.textContent = bioInput.value || "No description yet.";
      alert("Profile saved!");
    });

    document.getElementById("logoutProfileBtn").addEventListener("click", function () {
      if (window.LexoAuth) window.LexoAuth.logout();
    });
  });
</script>

</body>
</html>

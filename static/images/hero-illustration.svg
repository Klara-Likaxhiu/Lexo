        <path d="M12 4c-2.2-1.4-5.5-1.6-8 0v14c2.5-1.6 5.8-1.4 8 0"/>
        <path d="M12 4c2.2-1.4 5.5-1.6 8 0v14c-2.5-1.6-5.8-1.4-8 0"/>
      </g>
      <text x="222" y="185">LEXO</text>
    </g>

    <!-- MYSTERY -->
    <g filter="url(#barShadow)">

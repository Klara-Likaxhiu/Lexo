        <path d="M8 11.5c-1.6 1-2.6 2.6-2.6 4.5 0 3.2 2.6 5.7 6.6 5.7s6.6-2.5 6.6-5.7c0-1.9-1-3.5-2.6-4.5"/>
        <path d="M12 6.2c-1.5 0-2.6 1.1-2.6 2.5"/>
        <path d="M12 6.2c1.5 0 2.6 1.1 2.6 2.5"/>
        <path d="M9.6 12.8c-1 .65-1.6 1.7-1.6 2.9 0 2 1.6 3.6 4 3.6s4-1.6 4-3.6c0-1.2-.6-2.25-1.6-2.9"/>
        <path d="M12 10.2c-.85 0-1.5.65-1.5 1.45"/>

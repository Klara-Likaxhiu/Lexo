  <ellipse cx="500" cy="600" rx="130" ry="86" fill="#9db2a2" opacity="0.22"/>
  <ellipse cx="150" cy="575" rx="120" ry="78" fill="#9db2a2" opacity="0.2"/>
  <ellipse cx="320" cy="640" rx="210" ry="48" fill="#9db2a2" opacity="0.14"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 700" fill="none" role="img" aria-labelledby="heroArtTitle">
  <title id="heroArtTitle">Open book with genre bars under a teal arch, botanical leaves, and gold stars</title>
  <defs>
    <linearGradient id="archGrad" x1="190" y1="6" x2="450" y2="515" gradientUnits="userSpaceOnUse">
      <stop stop-color="#274f52"/>
      <stop offset="0.55" stop-color="#204446"/>
      <stop offset="1" stop-color="#193638"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="80" y1="520" x2="560" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2a5558"/>
      <stop offset="1" stop-color="#1e4346"/>
    </linearGradient>
    <linearGradient id="pageTop" x1="80" y1="480" x2="560" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbf6ec"/>
      <stop offset="0.5" stop-color="#f2e6d2"/>
      <stop offset="1" stop-color="#e8d7b8"/>
    </linearGradient>
    <linearGradient id="pageMid" x1="100" y1="500" x2="540" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5ecde"/>
      <stop offset="0.5" stop-color="#ead9bd"/>
      <stop offset="1" stop-color="#dfc9a5"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="300" y1="470" x2="340" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4aa82"/>
      <stop offset="0.45" stop-color="#e4d0b0"/>
      <stop offset="1" stop-color="#b6976f"/>
    </linearGradient>
    <filter id="archShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#102b43" flood-opacity="0.16"/>
    </filter>
    <filter id="bookShadow" x="-20%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#102b43" flood-opacity="0.16"/>
    </filter>
    <filter id="barShadow" x="-8%" y="-30%" width="116%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#102b43" flood-opacity="0.14"/>
    </filter>
  </defs>


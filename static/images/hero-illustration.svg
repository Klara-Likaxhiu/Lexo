    <path transform="translate(575 360) scale(0.28)" d="M12 0 L14.5 8.5 L23 9 L16.5 14.5 L18.5 23 L12 18.5 L5.5 23 L7.5 14.5 L1 9 L9.5 8.5 Z"/>

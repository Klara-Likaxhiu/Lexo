<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <script src="js/auth.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js" defer></script>
  <script src="js/community.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="community"></aside>

  <main class="dashboard community-page">

    <header class="dashboard-header">
      <div>
        <h1>Community</h1>
        <p class="page-subtitle">Discussions, reviews, and readers like you.</p>
      </div>
    </header>

    <nav class="community-tabs" role="tablist">
      <button type="button" class="community-tab active" data-tab="for-you">For You</button>
      <button type="button" class="community-tab" data-tab="discussions">Discussions</button>
      <button type="button" class="community-tab" data-tab="reviews">Reviews</button>
      <button type="button" class="community-tab" data-tab="clubs">Book Clubs</button>
    </nav>

    <section id="communityFeed" class="community-feed community-grid"></section>

  </main>
</div>

</body>
</html>

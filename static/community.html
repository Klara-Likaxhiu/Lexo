<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js?v=cover-pipeline-v1" defer></script>
  <script src="js/community.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="community"></aside>

  <main class="dashboard community-page">

    <header class="dashboard-header">
      <div>
        <h1>Community</h1>
        <p class="page-subtitle">Discussions, reviews, and readers like you.</p>
      </div>
    </header>

    <nav class="community-tabs" role="tablist" aria-label="Community sections">
      <button type="button" class="community-tab active" data-tab="for-you" role="tab" aria-selected="true">For You</button>
      <button type="button" class="community-tab" data-tab="discussions" role="tab" aria-selected="false">Discussions</button>
      <button type="button" class="community-tab" data-tab="reviews" role="tab" aria-selected="false">Reviews</button>
      <button type="button" class="community-tab" data-tab="clubs" role="tab" aria-selected="false">Book Clubs</button>
    </nav>

    <section id="communityFeed" class="community-feed community-grid" role="tabpanel" aria-live="polite"></section>

  </main>
</div>

<div id="communityToast" class="library-toast community-toast" hidden></div>

</body>
</html>

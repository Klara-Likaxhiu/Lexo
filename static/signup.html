<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/auth-ui.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card card">
    <a href="landing.html" class="back-link">← Back</a>

    <h1>Create your account</h1>
    <p>Join Lexo to save your library, track progress, and get personalized recommendations.</p>

    <div id="oauthButtons" class="oauth-buttons"></div>

    <form id="signupForm" novalidate>
      <label class="auth-label" for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" required minlength="3" maxlength="30">

      <label class="auth-label" for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required>

      <div class="password-field">
        <input type="password" id="password" placeholder="Password (min. 8 characters)" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Show password">
          <svg class="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
        </button>
      </div>

      <div class="password-field">
        <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" data-toggle-password="confirmPassword" aria-label="Show password">
          <svg class="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
        </button>
      </div>

      <p id="signupError" class="auth-error" hidden></p>

      <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
    </form>

    <p class="small-text">
      Already have an account? <a href="login.html">Log In</a>
    </p>
  </div>
</div>

</body>
</html>

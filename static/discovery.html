<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discovery - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <script src="js/auth.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/library.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js" defer></script>
  <script src="js/book-discovery.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="discovery"></aside>

  <main class="dashboard discovery-page">

    <header class="discovery-hero">
      <h1>Find your next obsession</h1>
    </header>

    <section class="discovery-search-section">
      <form id="discoverySearchForm" class="discovery-search-bar" role="search">
        <svg class="discovery-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="discoverySearchInput" placeholder="Search by title, author, or genre…" autocomplete="off" aria-label="Search books">
        <button type="button" class="discovery-search-clear" id="discoverySearchClear" hidden aria-label="Clear">&times;</button>
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
      <div class="discovery-search-filters" role="group" aria-label="Search type">
        <button type="button" class="discovery-filter active" data-mode="all">All</button>
        <button type="button" class="discovery-filter" data-mode="title">Title</button>
        <button type="button" class="discovery-filter" data-mode="author">Author</button>
        <button type="button" class="discovery-filter" data-mode="genre">Genre</button>
        <button type="button" class="btn btn-secondary" id="surpriseMeBtn">Surprise Me</button>
      </div>
      <p id="discoverySearchStatus" class="discovery-search-status" hidden></p>
    </section>

    <div id="discoveryResults" class="discovery-results"></div>

  </main>
</div>

<div id="bookDetailModal" class="discovery-modal" aria-hidden="true">
  <div class="discovery-modal-backdrop" data-modal-backdrop></div>
  <div class="discovery-modal-dialog card" data-modal-dialog role="dialog" aria-modal="true" aria-labelledby="modalBookTitle">
    <button type="button" class="discovery-modal-close" data-modal-close aria-label="Close">&times;</button>
    <div class="discovery-modal-layout">
      <div class="discovery-modal-cover" data-modal-cover></div>
      <div class="discovery-modal-content">
        <p class="eyebrow">Book Details</p>
        <h2 id="modalBookTitle" data-modal-title></h2>
        <p class="discovery-card-author" data-modal-author></p>
        <div class="discovery-modal-rating" data-modal-rating hidden></div>
        <dl class="discovery-detail-grid" data-modal-details></dl>
        <div class="discovery-modal-description-wrap">
          <p class="discovery-modal-description-label">About this book</p>
          <p data-modal-description class="discovery-modal-description"></p>
        </div>
        <p class="discovery-modal-hint" data-modal-hint hidden></p>
        <div class="discovery-modal-actions">
          <button type="button" class="btn btn-secondary discovery-shelf-btn" data-shelf="want" data-label="Want to Read">Want to Read</button>
          <button type="button" class="btn btn-primary discovery-shelf-btn" data-shelf="reading" data-label="Currently Reading">Currently Reading</button>
          <button type="button" class="btn btn-secondary discovery-shelf-btn" data-shelf="read" data-label="Finished">Finished</button>
          <button type="button" class="btn btn-secondary discovery-shelf-btn" data-shelf="not_interested" data-label="Not Interested">Not Interested</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="discoveryToast" class="library-toast" hidden></div>

</body>
</html>

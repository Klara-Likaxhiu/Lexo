<!DOCTYPE html>
<html>
<head>
  <title>AI Companion - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js?v=cover-pipeline-v1" defer></script>
  <script src="js/library.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="ai-companion"></aside>

  <main class="dashboard companion-page">

    <div class="companion-layout">
      <div class="companion-chat-panel">
        <nav class="companion-tabs" aria-label="Companion modes">
          <button type="button" class="companion-tab active" data-mode="ask">Ask</button>
          <button type="button" class="companion-tab" data-mode="recommend">Recommend</button>
          <button type="button" class="companion-tab" data-mode="summarize">Summarize</button>
          <button type="button" class="companion-tab" data-mode="quiz">Quiz Me</button>
          <button type="button" class="companion-tab" data-mode="themes">Themes</button>
        </nav>
        <div class="chat-shell">
      <div class="chat-header">
        <p class="eyebrow">AI Reading Companion</p>
        <h1>Lexo Librarian</h1>
        <p id="modeText">Ask for books based on your mood, goal, genre, time, or Reader DNA.</p>
      </div>

      <div id="chatMessages" class="chat-messages">
        <div class="companion-empty-state" id="companionEmptyState">
          <p>📚 Ask me anything about books, discover your next read, or explore your Reader DNA.</p>
        </div>
      </div>

      <div class="prompt-chips">
        <button>Recommend something like Verity but less romantic</button>
        <button>I want a mystery under 300 pages</button>
        <button>Give me a sad but beautiful book</button>
        <button>I want a shocking plot twist</button>
      </div>

      <div class="companion-input-row chat-input">
        <input id="companionQuestion" placeholder="Ask your AI librarian…" aria-label="Question">
        <button id="askBtn" class="btn btn-primary" type="button">Send</button>
      </div>
        </div>
      </div>
    </div>

  </main>

</div>

<script>
  const questionInput = document.getElementById("companionQuestion");
  const askBtn = document.getElementById("askBtn");
  const chatMessages = document.getElementById("chatMessages");
  const modeText = document.getElementById("modeText");

  const todayMood = localStorage.getItem("lexo_today_mood");
  const todayGoal = localStorage.getItem("lexo_today_goal");

  if (todayMood || todayGoal) {
    modeText.textContent = `Today's mode: ${todayMood || "any mood"} + ${todayGoal || "any goal"}.`;
  }

  function getCoverClass(genre) {
    genre = (genre || "").toLowerCase();
    if (genre.includes("romance")) return "romance-cover";
    if (genre.includes("fantasy")) return "fantasy-cover";
    if (genre.includes("sci")) return "scifi-cover";
    if (genre.includes("horror")) return "horror-cover";
    return "mystery-cover";
  }

  function getCoverIcon(genre) {
    genre = (genre || "").toLowerCase();
    const wrap = p => `<svg class="cover-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
    if (genre.includes("romance")) return wrap('<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>');
    if (genre.includes("fantasy")) return wrap('<path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287z"/>');
    if (genre.includes("sci")) return wrap('<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>');
    if (genre.includes("horror")) return wrap('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>');
    return wrap('<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/>');
  }

  async function saveBook(book, status) {
    try {
      await LexoLibrary.addBook(book, status);
    } catch (error) {
      alert(error.message || "Could not save book.");
    }
  }

  function openDetails(book) {
    const item = {
      ai_recommendation: {
        title: book.title,
        author: book.author,
        genre: book.genre,
        pages: book.pages || book.page_count || null,
        page_count: book.page_count || book.pages || null,
        cover_url: book.cover_url || null,
        difficulty: "Recommended by AI",
        reason: book.reason
      },
      book_data: null
    };

    localStorage.setItem("selectedBook", JSON.stringify(item));
    window.location.href = "book-details.html";
  }

  function addUserMessage(text) {
    document.getElementById("companionEmptyState")?.remove();

    const div = document.createElement("div");
    div.className = "message user-message";

    div.innerHTML = `
      <strong>You</strong>
      <p>${text}</p>
    `;

    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addLoadingMessage() {
    const div = document.createElement("div");
    div.className = "message ai-message loading-message";

    div.innerHTML = `
      <strong>Lexo</strong>
      <p>Thinking... checking your Reader DNA, today’s mood, and reading goal.</p>
    `;

    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return div;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function normalizeCompanionBooks(result) {
    const raw =
      result?.recommendations ||
      result?.recommended_books ||
      result?.books ||
      [];
    const list = Array.isArray(raw) ? raw : raw && typeof raw === "object" ? [raw] : [];
    return list
      .map(item => {
        if (!item || typeof item !== "object") return null;
        const nested =
          item.ai_recommendation && typeof item.ai_recommendation === "object"
            ? item.ai_recommendation
            : null;
        const book = nested ? { ...nested, ...item, ...nested } : { ...item };
        delete book.ai_recommendation;
        const title = String(book.title || "").trim();
        if (!title) return null;
        book.title = title;
        book.author = book.author || "Unknown Author";
        book.genre = book.genre || "Book";
        book.page_count =
          book.page_count || book.pages || book.total_pages || book.pageCount || null;
        book.pages = book.pages || book.page_count;
        return book;
      })
      .filter(Boolean);
  }

  function pageLabel(book) {
    const pages = Number(book.page_count || book.pages || book.total_pages);
    if (!pages || pages <= 0) return "Page count unknown";
    return `${pages} pages`;
  }

  function addAIRecommendationMessage(result, loadingDiv) {
    const allBooks = normalizeCompanionBooks(result);

    // Soft library filter — keep books when LexoLibrary isn't ready.
    let recs = allBooks;
    try {
      if (window.LexoLibrary?.findShelf) {
        recs = allBooks.filter(book => !LexoLibrary.findShelf(book));
      }
    } catch (_) {
      recs = allBooks;
    }

    const reasoning = Array.isArray(result?.reasoning) ? result.reasoning : [];
    const hasBooks = recs.length > 0;
    const message = hasBooks
      ? result?.message || "I found some books for you."
      : "I couldn't find a matching book that isn't already in your library. Try a different genre, length, or mood.";

    loadingDiv.classList.add("has-book-cards");
    loadingDiv.innerHTML = "";

    const strong = document.createElement("strong");
    strong.textContent = "Lexo";
    loadingDiv.appendChild(strong);

    const summary = document.createElement("div");
    summary.className = "ai-summary";

    const messageP = document.createElement("p");
    messageP.textContent = message;
    summary.appendChild(messageP);

    const moodPill = document.createElement("div");
    moodPill.className = "mood-pill";
    moodPill.innerHTML = `
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287z"/></svg>
      Mood detected: ${escapeHtml(result?.mood_detected || todayMood || "Reading mood")}
    `;
    summary.appendChild(moodPill);

    if (todayGoal) {
      const goalPill = document.createElement("div");
      goalPill.className = "mood-pill";
      goalPill.innerHTML = `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Today's goal: ${escapeHtml(todayGoal)}
      `;
      summary.appendChild(goalPill);
    }

    loadingDiv.appendChild(summary);

    const grid = document.createElement("div");
    grid.className = "companion-card-grid";

    if (!hasBooks) {
      const empty = document.createElement("div");
      empty.className = "companion-empty-recs";
      empty.innerHTML = `<p>No book cards to show yet. Ask again with different constraints, or clear a book from your library shelves.</p>`;
      grid.appendChild(empty);
      loadingDiv.appendChild(grid);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return;
    }

    recs.forEach(book => {
      const card = document.createElement("div");
      card.className = "companion-book-card card";

      const coverHtml = window.BookCover
        ? BookCover.html(book, {
            imgClass: "companion-cover-img book-cover-img",
            wrapClass: "companion-cover-wrap book-cover-wrap",
            placeholderClass: "custom-cover book-cover-placeholder",
          })
        : `<div class="companion-cover-wrap"><div class="custom-cover ${getCoverClass(book.genre)}"><span>${getCoverIcon(book.genre)}</span><p>${escapeHtml(book.genre || "Book")}</p></div></div>`;

      card.innerHTML = `
        ${coverHtml}
        <div class="match-badge">
          <svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.09 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L1.85 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
          ${escapeHtml(book.match || 90)}% Match
        </div>
        <h3>${escapeHtml(book.title)}</h3>
        <p class="book-author">${escapeHtml(book.author || "Unknown Author")}</p>
        <div class="book-meta companion-book-meta">
          <span>${escapeHtml(book.genre || "Book")}</span>
          <span>${escapeHtml(pageLabel(book))}</span>
        </div>
        <p class="reason">${escapeHtml(book.reason || "")}</p>
        <div class="book-actions">
          <button type="button" class="mini-btn companion-add-btn">Add to Library</button>
          <button type="button" class="mini-btn companion-details-btn">View Details</button>
        </div>
      `;

      card.querySelector(".companion-add-btn")?.addEventListener("click", event => {
        event.stopPropagation();
        saveBook(book, "want");
      });
      card.querySelector(".companion-details-btn")?.addEventListener("click", event => {
        event.stopPropagation();
        openDetails(book);
      });

      grid.appendChild(card);
    });

    loadingDiv.appendChild(grid);

    if (reasoning.length > 0) {
      const box = document.createElement("div");
      box.className = "reasoning-box";
      box.innerHTML = `
        <h4>Why these books?</h4>
        ${reasoning
          .map(
            reason =>
              `<p><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> ${escapeHtml(reason)}</p>`
          )
          .join("")}
      `;
      loadingDiv.appendChild(box);
    }

    chatMessages.scrollTop = chatMessages.scrollHeight;

    if (window.BookCover) {
      BookCover.hydrateMany(recs, loadingDiv, { imgClass: "companion-cover-img book-cover-img" });
    }
  }

  document.querySelectorAll(".prompt-chips button").forEach(button => {
    button.addEventListener("click", () => {
      questionInput.value = button.textContent;
    });
  });

  document.querySelectorAll(".companion-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".companion-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const prompts = {
        ask: "What should I read tonight?",
        recommend: "Recommend 3 books based on my Reader DNA",
        summarize: "Summarize my currently reading book",
        quiz: "Quiz me on the book I'm reading",
        themes: "What are the main themes in my current read?",
      };
      questionInput.placeholder = prompts[tab.dataset.mode] || "Ask your AI librarian…";
    });
  });

  askBtn.addEventListener("click", async () => {
    const question = questionInput.value.trim();

    if (!question) {
      alert("Please write a question first.");
      return;
    }

    addUserMessage(question);
    questionInput.value = "";

    const loadingDiv = addLoadingMessage();
    askBtn.disabled = true;

    try {
      const response = await fetch("/api/reader/companion", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(window.LexoAuth ? window.LexoAuth.getAuthHeaders() : {})
        },
        body: JSON.stringify({
          question: question,
          reader_profile: await LexoAPI.getReaderContext()
        })
      });

      const result = await response.json();
      if (!response.ok) {
        throw new Error(result?.detail || result?.message || "Companion request failed.");
      }
      addAIRecommendationMessage(result, loadingDiv);
    } catch (error) {
      loadingDiv.innerHTML = `
        <strong>Lexo</strong>
        <p>${escapeHtml(error?.message || "Something went wrong. Please try again.")}</p>
      `;
    } finally {
      askBtn.disabled = false;
    }
  });

  void (async () => {
    if (window.LexoAuth?.whenReady) {
      await window.LexoAuth.whenReady();
    }
    if (window.LexoAuth?.isLoggedIn()) {
      LexoLibrary.ensureLoaded().catch(() => {});
    }
  })();
</script>

</body>
</html>

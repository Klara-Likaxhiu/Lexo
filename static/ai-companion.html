<!DOCTYPE html>
<html>
<head>
  <title>AI Companion - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <script src="js/auth.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/book-cover.js" defer></script>
  <script src="js/library.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="ai-companion"></aside>

  <main class="dashboard companion-page">

    <div class="companion-layout">
      <div class="companion-room">
        <div class="companion-room-art" role="img" aria-label="Cozy reading room"></div>
      </div>
      <div class="companion-chat-panel">
        <nav class="companion-tabs" aria-label="Companion modes">
          <button type="button" class="companion-tab active" data-mode="ask">Ask</button>
          <button type="button" class="companion-tab" data-mode="recommend">Recommend</button>
          <button type="button" class="companion-tab" data-mode="summarize">Summarize</button>
          <button type="button" class="companion-tab" data-mode="quiz">Quiz Me</button>
          <button type="button" class="companion-tab" data-mode="themes">Themes</button>
        </nav>
        <div class="chat-shell">
      <div class="chat-header">
        <p class="eyebrow">AI Reading Companion</p>
        <h1>BookMindAI Librarian</h1>
        <p id="modeText">Ask for books based on your mood, goal, genre, time, or Reader DNA.</p>
      </div>

      <div id="chatMessages" class="chat-messages">
        <div class="message ai-message">
          <strong>BookMindAI</strong>
          <p>Hi! Tell me what you're in the mood for and I’ll recommend books based on your Reader DNA.</p>
        </div>
      </div>

      <div class="prompt-chips">
        <button>Recommend something like Verity but less romantic</button>
        <button>I want a mystery under 300 pages</button>
        <button>Give me a sad but beautiful book</button>
        <button>I want a shocking plot twist</button>
      </div>

      <div class="companion-input-row chat-input">
        <input id="companionQuestion" placeholder="Ask your AI librarian…" aria-label="Question">
        <button id="askBtn" class="btn btn-primary" type="button">Send</button>
      </div>
        </div>
      </div>
    </div>

  </main>

</div>

<script>
  const questionInput = document.getElementById("companionQuestion");
  const askBtn = document.getElementById("askBtn");
  const chatMessages = document.getElementById("chatMessages");
  const modeText = document.getElementById("modeText");

  const todayMood = localStorage.getItem("bookmind_today_mood");
  const todayGoal = localStorage.getItem("bookmind_today_goal");

  if (todayMood || todayGoal) {
    modeText.textContent = `Today's mode: ${todayMood || "any mood"} + ${todayGoal || "any goal"}.`;
  }

  function getCoverClass(genre) {
    genre = (genre || "").toLowerCase();
    if (genre.includes("romance")) return "romance-cover";
    if (genre.includes("fantasy")) return "fantasy-cover";
    if (genre.includes("sci")) return "scifi-cover";
    if (genre.includes("horror")) return "horror-cover";
    return "mystery-cover";
  }

  function getCoverIcon(genre) {
    genre = (genre || "").toLowerCase();
    const wrap = p => `<svg class="cover-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
    if (genre.includes("romance")) return wrap('<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>');
    if (genre.includes("fantasy")) return wrap('<path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287z"/>');
    if (genre.includes("sci")) return wrap('<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>');
    if (genre.includes("horror")) return wrap('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>');
    return wrap('<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/>');
  }

  async function saveBook(book, status) {
    try {
      await BookMindLibrary.addBook(book, status);
    } catch (error) {
      alert(error.message || "Could not save book.");
    }
  }

  function openDetails(book) {
    const item = {
      ai_recommendation: {
        title: book.title,
        author: book.author,
        genre: book.genre,
        difficulty: "Recommended by AI",
        reason: book.reason
      },
      book_data: null
    };

    localStorage.setItem("selectedBook", JSON.stringify(item));
    window.location.href = "book-details.html";
  }

  function addUserMessage(text) {
    const div = document.createElement("div");
    div.className = "message user-message";

    div.innerHTML = `
      <strong>You</strong>
      <p>${text}</p>
    `;

    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addLoadingMessage() {
    const div = document.createElement("div");
    div.className = "message ai-message loading-message";

    div.innerHTML = `
      <strong>BookMindAI</strong>
      <p>Thinking... checking your Reader DNA, today’s mood, and reading goal.</p>
    `;

    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return div;
  }

  function addAIRecommendationMessage(result, loadingDiv) {
    // Safety net: never show books already finished, not interested, or in My Library.
    const recs = (result.recommendations || []).filter(
      book => !BookMindLibrary.findShelf(book)
    );
    const reasoning = result.reasoning || [];

    loadingDiv.innerHTML = `
      <strong>BookMindAI</strong>

      <div class="ai-summary">
        <p>${result.message || "I found some books for you."}</p>

        <div class="mood-pill">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287z"/></svg>
          Mood detected: ${result.mood_detected || todayMood || "Reading mood"}
        </div>

        ${
          todayGoal
            ? `<div class="mood-pill"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Today’s goal: ${todayGoal}</div>`
            : ""
        }

        ${
          reasoning.length > 0
            ? `
              <div class="reasoning-box">
                <h4>Why these books?</h4>
                ${reasoning.map(reason => `<p><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> ${reason}</p>`).join("")}
              </div>
            `
            : ""
        }
      </div>

      <div class="companion-card-grid">
        ${recs.map(book => {
          const coverHtml = window.BookMindCoverImage
            ? BookMindCoverImage.html(book, {
                imgClass: "companion-cover-img book-cover-img",
                wrapClass: "companion-cover-wrap book-cover-wrap",
                placeholderClass: "custom-cover book-cover-placeholder",
              })
            : `<div class="custom-cover ${getCoverClass(book.genre)}"><span>${getCoverIcon(book.genre)}</span><p>${book.genre || "Book"}</p></div>`;

          return `
            <div class="companion-book-card card">
              ${coverHtml}

              <div class="match-badge"><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.09 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L1.85 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg> ${book.match || 90}% Match</div>

              <h3>${book.title}</h3>
              <p class="book-author">${book.author || "Unknown Author"}</p>
              <p class="reason">${book.reason || ""}</p>

              <div class="book-actions">
                <button class="mini-btn" onclick='saveBook(${JSON.stringify(book)}, "want")'><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> Want</button>
                <button class="mini-btn" onclick='saveBook(${JSON.stringify(book)}, "read")'><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg> Read</button>
                <button class="mini-btn" onclick='openDetails(${JSON.stringify(book)})'><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Details</button>
                <button class="mini-btn" onclick='window.open("https://www.google.com/maps/search/${encodeURIComponent(book.title + " bookstore near me")}", "_blank")'><svg class="icon icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg> Buy</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;

    chatMessages.scrollTop = chatMessages.scrollHeight;

    if (window.BookMindCoverImage) {
      BookMindCoverImage.hydrateMany(recs, chatMessages, { imgClass: "companion-cover-img book-cover-img" });
    }
  }

  document.querySelectorAll(".prompt-chips button").forEach(button => {
    button.addEventListener("click", () => {
      questionInput.value = button.textContent;
    });
  });

  document.querySelectorAll(".companion-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".companion-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const prompts = {
        ask: "What should I read tonight?",
        recommend: "Recommend 3 books based on my Reader DNA",
        summarize: "Summarize my currently reading book",
        quiz: "Quiz me on the book I'm reading",
        themes: "What are the main themes in my current read?",
      };
      questionInput.placeholder = prompts[tab.dataset.mode] || "Ask your AI librarian…";
    });
  });

  askBtn.addEventListener("click", async () => {
    const question = questionInput.value.trim();

    if (!question) {
      alert("Please write a question first.");
      return;
    }

    addUserMessage(question);
    questionInput.value = "";

    const loadingDiv = addLoadingMessage();

    const response = await fetch("/api/reader/companion", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...(window.BookMindAuth ? BookMindAuth.getAuthHeaders() : {})
      },
      body: JSON.stringify({
        question: question,
        reader_profile: await BookMindAPI.getReaderContext()
      })
    });

    const result = await response.json();

    addAIRecommendationMessage(result, loadingDiv);
  });

  void (async () => {
    if (window.BookMindAuth?.whenReady) {
      await BookMindAuth.whenReady();
    }
    if (window.BookMindAuth?.isLoggedIn()) {
      BookMindLibrary.ensureLoaded().catch(() => {});
    }
  })();
</script>

</body>
</html>

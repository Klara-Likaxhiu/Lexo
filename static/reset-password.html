<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <script src="js/auth-ui.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card card">
    <a href="login.html" class="back-link">← Back to login</a>

    <h1>Choose a new password</h1>
    <p>Enter a new password for your account.</p>

    <form id="resetForm">
      <div class="password-field">
        <input type="password" id="password" placeholder="New password (min. 8 characters)" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Show password">
          <svg class="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
        </button>
      </div>

      <div class="password-field">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" data-toggle-password="confirmPassword" aria-label="Show password">
          <svg class="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
        </button>
      </div>

      <p id="resetError" class="auth-error" hidden></p>
      <button type="submit" class="btn btn-primary" id="resetBtn">Update password</button>
    </form>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    BookMindAuthUI.initPasswordToggles();
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token_hash") || params.get("token");
    const type = params.get("type") || "recovery";
    if (!token) {
      BookMindAuth.showError("resetError", "Invalid reset link. Request a new one from the login page.");
      document.getElementById("resetBtn").disabled = true;
      return;
    }

    document.getElementById("resetForm").addEventListener("submit", async e => {
      e.preventDefault();
      BookMindAuth.hideError("resetError");

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;
      const button = document.getElementById("resetBtn");

      if (password.length < 8) {
        BookMindAuth.showError("resetError", "Password must be at least 8 characters.");
        return;
      }
      if (password !== confirm) {
        BookMindAuth.showError("resetError", "Passwords do not match.");
        return;
      }

      BookMindAuthUI.setLoading(button, true, "Update password", "Updating…");

      try {
        await BookMindAuth.resetPassword(token, password, type);
        BookMindAuthUI.showToast("Password updated. You can log in now.");
        setTimeout(() => (window.location.href = "login.html"), 1200);
      } catch (error) {
        BookMindAuth.showError("resetError", error.message || "Could not reset password.");
        BookMindAuthUI.setLoading(button, false, "Update password");
      }
    });
  });
</script>

</body>
</html>

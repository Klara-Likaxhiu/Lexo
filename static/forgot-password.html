<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/auth-ui.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card card">
    <a href="login.html" class="back-link">← Back to login</a>

    <h1>Reset your password</h1>
    <p>Enter your email and we'll send you a link to reset your password.</p>

    <div class="auth-notice auth-notice-info">
      <strong>Check your Spam or Junk folder</strong> if the reset email doesn't arrive within a few minutes.
    </div>

    <form id="forgotForm" novalidate>
      <label class="auth-label" for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Email address" autocomplete="email" required>
      <p id="forgotError" class="auth-error" hidden></p>
      <p id="forgotSuccess" class="auth-success" hidden></p>
      <button type="submit" class="btn btn-primary" id="forgotBtn">Send reset link</button>
    </form>
  </div>
</div>

<script>
  document.getElementById("forgotForm").addEventListener("submit", async e => {
    e.preventDefault();
    window.LexoAuth.hideError("forgotError");
    document.getElementById("forgotSuccess").hidden = true;

    const email = document.getElementById("email").value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      window.LexoAuth.showError("forgotError", "Please enter a valid email address (e.g. name+tag@example.com).");
      return;
    }
    const button = document.getElementById("forgotBtn");
    LexoAuthUI.setLoading(button, true, "Send reset link", "Sending…");

    try {
      const data = await window.LexoAuth.forgotPassword(email);
      document.getElementById("forgotSuccess").textContent = data.message;
      document.getElementById("forgotSuccess").hidden = false;
      LexoAuthUI.showToast("Check your email for reset instructions.");
    } catch (error) {
      window.LexoAuth.showError("forgotError", error.message || "Could not send reset email.");
    } finally {
      LexoAuthUI.setLoading(button, false, "Send reset link");
    }
  });
</script>

</body>
</html>

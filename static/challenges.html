<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Challenges - BookMindAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/library.js" defer></script>
  <script src="js/badge-catalog.js" defer></script>
  <script src="js/badge-engine.js" defer></script>
  <script src="js/challenges.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="challenges"></aside>

  <main class="dashboard challenges-page">

    <section class="level-hero card">
      <div class="level-badge-large" id="readerLevelBadge">1</div>
      <div class="level-info">
        <p class="eyebrow">Reader Level</p>
        <h2 id="levelTitle">Level 1 Reader</h2>
        <div class="level-xp-bar"><div class="level-xp-fill" id="levelXpFill" style="width:35%"></div></div>
      </div>
    </section>

    <section class="quest-row">
      <div class="quest-card card">
        <div class="quest-icon">📖</div>
        <h3>Daily Quest</h3>
        <p id="dailyQuestText">Read for 15 minutes today</p>
      </div>
      <div class="quest-card card">
        <div class="quest-icon">🏆</div>
        <h3>Weekly Quest</h3>
        <p id="weeklyQuestText">Finish 1 book this week</p>
      </div>
      <div class="quest-card card locked">
        <div class="quest-icon">🔒</div>
        <h3>Secret Mission</h3>
        <p>Unlock at Level 5</p>
      </div>
    </section>

    <section class="progress-cards" id="progressCards"></section>

    <section class="goal-card card">
      <p class="eyebrow">Reading Goals</p>
      <h2>Set your targets</h2>
      <div class="goal-inputs">
        <label><span>Books this year</span><input id="goalYearly" type="number" min="0" placeholder="e.g. 24"></label>
        <label><span>Books this month</span><input id="goalMonthly" type="number" min="0" placeholder="e.g. 2"></label>
        <button id="saveGoalsBtn" class="btn btn-primary" type="button">Save Goals</button>
      </div>
      <p id="goalMessage" class="small-muted"></p>
    </section>

    <section class="badge-stats-bar card" id="badgeStatsBar"></section>

    <section class="newest-badges card" id="newestBadgesSection" hidden>
      <p class="eyebrow">Recently Earned</p>
      <h2>Your newest badges</h2>
      <div class="newest-badges-row" id="newestBadgesRow"></div>
    </section>

    <section class="achievements-section">
      <div class="achievements-header">
        <div>
          <p class="eyebrow">Achievements</p>
          <h2 class="achievements-title">Badge Collection</h2>
        </div>
        <p class="badge-completion" id="badgeCompletion"></p>
      </div>
      <div class="badge-toolbar">
        <div class="badge-tabs" role="tablist">
          <button type="button" class="badge-tab active" data-tab="all">All</button>
          <button type="button" class="badge-tab" data-tab="earned">Earned</button>
          <button type="button" class="badge-tab" data-tab="locked">Locked</button>
        </div>
        <div class="badge-filters">
          <label><span class="sr-only">Category</span><select id="filterCategory" class="achievement-filter"><option value="">All categories</option></select></label>
          <label><span class="sr-only">Rarity</span><select id="filterRarity" class="achievement-filter"><option value="">All rarities</option><option value="common">Common</option><option value="rare">Rare</option><option value="epic">Epic</option><option value="legendary">Legendary</option></select></label>
        </div>
      </div>
      <div class="achievements-grid badge-grid badge-grid-v2" id="badgeGrid"></div>
      <p class="badge-empty" id="badgeEmpty" hidden>No badges match your filters.</p>
    </section>

  </main>
</div>

</body>
</html>

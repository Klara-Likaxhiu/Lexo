<!DOCTYPE html>
<html>
<head>
  <title>Verify Email - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/auth-ui.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card card auth-status-card auth-verify-pending">
    <div class="auth-status-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
    </div>

    <h1>Verify your email</h1>
    <p>We sent a verification link to <strong id="pendingEmail">your email</strong>.</p>

    <div class="auth-notice auth-notice-info">
      <strong>Check your Spam or Junk folder</strong> if you don't see the email within a few minutes.
    </div>

    <p class="small-muted">You must verify your email before accessing My Library, Reader DNA, and other personal data.</p>

    <p id="statusMessage" class="auth-status-message" hidden></p>
    <p id="resendError" class="auth-error" hidden></p>
    <p id="resendSuccess" class="auth-success" hidden></p>

    <div class="auth-verify-actions">
      <button type="button" class="btn btn-primary" id="checkVerifiedBtn">I've verified — continue</button>
      <button type="button" class="btn btn-secondary" id="resendBtn">Resend verification email</button>
    </div>

    <p class="small-text">
      Wrong email? <a href="/signup.html" id="signupAgainLink">Sign up again</a>
      · <a href="/login.html" id="backToLoginLink">Back to login</a>
    </p>
  </div>
</div>

</body>
</html>

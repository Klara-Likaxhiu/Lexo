<!DOCTYPE html>
<html>
<head>
  <title>Want to Read - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/library.js" defer></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar-editorial" data-page="library"></aside>

  <main class="dashboard">
    <h1>Want to Read</h1>
    <p class="page-subtitle">Books saved for your future reading list.</p>

    <div id="wantList" class="library-grid"></div>
  </main>

</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("wantList");
    try {
      await LexoLibrary.ensureLoaded();
      const books = LexoLibrary.getBooksByStatus("want");
      if (!books.length) {
        container.innerHTML = `<p class="empty-text">No future reads saved yet.</p>`;
        return;
      }
      books.forEach(book => {
        const card = document.createElement("div");
        card.className = "small-book-card card";
        card.innerHTML = `
          <div class="small-cover"><svg class="cover-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></div>
          <h3>${book.title}</h3>
          <p>${book.author || "Unknown Author"}</p>
          <span>${book.genre || "Book"}</span>
        `;
        container.appendChild(card);
      });
    } catch {
      container.innerHTML = `<p class="empty-text">Could not load your library.</p>`;
    }
  });
</script>

</body>
</html>

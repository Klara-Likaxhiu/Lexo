<!DOCTYPE html>
<html>
<head>
  <title>Verify Email - Lexo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/design-system.css">
  <script src="js/auth.js"></script>
  <script src="js/auth-ui.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card card auth-status-card auth-verify-pending">
    <div class="auth-status-icon" id="verifyIcon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
    </div>

    <h1 id="verifyTitle">Verifying your email…</h1>
    <p id="verifyMessage">Please wait while we confirm your email address.</p>

    <p id="verifySuccess" class="auth-success" hidden></p>
    <p id="verifyError" class="auth-error" hidden></p>

    <div id="verifyActions" class="auth-verify-actions" hidden>
      <button type="button" class="btn btn-primary" id="goLoginBtn">Go to login</button>
      <button type="button" class="btn btn-secondary" id="resendBtn">Resend verification email</button>
    </div>

    <p class="small-text" id="verifyFooter" hidden>
      <a href="/login.html">Back to login</a> · <a href="/signup.html">Sign up</a>
    </p>
  </div>
</div>

</body>
</html>
